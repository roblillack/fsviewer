name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            pkg-config \
            gettext \
            libxpm-dev \
            libwmaker-dev \
            libwraster-dev \
            libwings-dev \
            libxmu-dev \
            libpango1.0-dev \
            libsysprof-4-dev

      - name: Configure
        run: cmake .

      - name: Build
        run: make

  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Configure
        run: cmake .

      - name: Check formatting
        run: make format-check
